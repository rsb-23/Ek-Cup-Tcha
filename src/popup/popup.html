<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 300px;
        padding: 10px;
      }
      button {
        cursor: pointer;
      }
      footer {
        display: flex;
        justify-content: space-evenly;
      }
      #solveCaptcha {
        width: 100%;
        margin: 5px;
        padding: 8px;
      }
      .button-container {
        display: flex;
        justify-content: space-between;
      }
      #refreshButton {
        width: fit-content;
        border: none;
      }
      .preview-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60px;
        border: 1px dashed #ccc;
        margin: 2px 0;
        padding: 2px;
      }
      #captchaPreview {
        max-width: 100%;
        margin: 10px 0;
        border: 1px solid #ccc;
        align-self: right;
      }
      .status {
        color: #666;
        font-size: 14px;
        margin: 5px 0;
      }
      #captchaCopy {
        border-style: dotted;
        font-size: medium;
      }
    </style>
  </head>
  <body>
    <div id="captchaContainer">
      <div class="button-container">
        <p class="status">Detected CAPTCHA:</p>
        <button id="refreshButton"><img src="refresh.svg" height="15px" /></button>
      </div>
      <div class="preview-container">
        <img id="captchaPreview" alt="CAPTCHA preview" style="display: none" />
      </div>
    </div>
    <button id="solveCaptcha">Solve CAPTCHA</button>
    <footer>
      <p id="status" class="status"></p>
      <button id="captchaCopy" hidden>XXXXX</button>
    </footer>
    <script src="popup.js"></script>
    <!-- <script src="browser-polyfill.min.js"></script> -->
  </body>
</html>
